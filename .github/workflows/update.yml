name: Update EPG

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch sources + build merged playlist + EPG
        run: python3 build_filtered_playlist.py

      - name: Commit and push
        run: |
          git config user.email "vectrix@openclaw.ai"
          git config user.name "Vectrix"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update: $(date '+%Y-%m-%d %H:%M UTC')"
          git push
